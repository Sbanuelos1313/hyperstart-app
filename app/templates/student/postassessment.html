<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HyperStart — Post Assessment</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'DM Sans',sans-serif;
  background:#060d18;
  color:#f0f4ff;
  min-height:100vh;
  position:relative;
  overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background: radial-gradient(ellipse 80% 60% at 100% 0%,rgba(13,90,100,0.35),transparent 60%),
              radial-gradient(ellipse 50% 40% at 0% 100%,rgba(8,50,70,0.2),transparent 60%),
              radial-gradient(ellipse 40% 30% at 50% 0%,rgba(245,200,66,0.04),transparent 50%);
}
.topbar{
  position:relative;z-index:2;
  background:rgba(7,11,20,0.9);
  backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,0.07);
  padding:0 20px;height:52px;
  display:flex;align-items:center;justify-content:space-between;
}
.back-btn{
  background:rgba(255,255,255,0.1);
  color:white;
  border:1px solid rgba(255,255,255,0.2);
  padding:6px 14px;
  border-radius:8px;
  font-size:13px;
  cursor:pointer;
}
.scroll{height:calc(100vh - 52px);overflow-y:auto;padding:28px 20px 80px;}
.inner{max-width:480px;margin:0 auto;}
.hero{text-align:center;margin:40px 0 30px;}
.hero-icon{font-size:80px;margin-bottom:16px;}
.hero-title{font-family:'Bricolage Grotesque',sans-serif;font-size:28px;font-weight:800;color:#f5c842;}
.growth-box{
  background:rgba(45,212,191,0.15);
  border:2px solid #2dd4bf;
  border-radius:16px;
  padding:24px;
  text-align:center;
  margin:30px 0;
}
.growth-number{font-size:42px;font-weight:800;color:#2dd4bf;}
.submit-btn{
  width:100%;padding:16px;
  background:#f5c842;color:#0a0e1a;
  border:none;border-radius:12px;
  font-size:17px;font-weight:800;
  cursor:pointer;margin-top:20px;
}
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="goBack()">← Back to Portal</button>
  <div class="logo" style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;">Hyper<em>Start</em></div>
</div>

<div class="scroll">
  <div class="inner">
    <div class="hero">
      <div class="hero-icon">🎉</div>
      <div class="hero-title">Amazing Work!</div>
      <p style="color:#8b95b0;font-size:15px;">You've completed the program.</p>
    </div>

    <div class="growth-box">
      <p style="margin-bottom:8px;color:#2dd4bf;font-weight:600;">Your Growth</p>
      <div class="growth-number">+87</div>
      <p style="margin-top:8px;">Total Growth Points</p>
    </div>

    <div class="card" style="background:var(--surf);padding:20px">
      <h3 style="color:#2dd4bf">What Changed</h3>
      <p>You now feel more confident in STEM careers, understand money better, and can clearly see how you can make an impact.</p>
    </div>

    <button class="submit-btn" onclick="finishProgram()">Return to Portal →</button>
  </div>
</div>

<script>
function goBack() {
  window.location.href = '/static/portal.html';
}
function finishProgram() {
  alert("Congratulations! You've completed HyperStart.");
  window.location.href = '/static/portal.html';
}
</script>
</body>
</html>
