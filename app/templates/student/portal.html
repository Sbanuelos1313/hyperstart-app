<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HyperStart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f172a;--surf:#1e2937;--surf2:#334155;--border:rgba(255,255,255,0.1);--gold:#facc15;--teal:#22d3ee;--accent:#f472b6;--muted:#94a3b8;--r:20px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:#f1f5f9;height:100vh;overflow:hidden;position:relative}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(circle at 30% 20%,rgba(34,211,238,0.3),transparent 60%),radial-gradient(circle at 70% 80%,rgba(250,204,21,0.25),transparent 60%);}
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:20px;box-shadow:0 10px 30px rgba(0,0,0,0.4);}
.btn{display:block;width:100%;padding:16px;border-radius:14px;background:var(--gold);color:#0f172a;font-weight:700;text-align:center;margin-top:12px;cursor:pointer}
.btn-teal{background:var(--teal);color:#0f172a}
.h1{font-size:26px;font-weight:800;margin-bottom:8px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;padding:14px 0;background:rgba(15,23,42,0.97);border-top:1px solid #334155;display:flex;font-size:13px;z-index:10}
.bottom-nav > div{flex:1;text-align:center;cursor:pointer;padding:8px 4px}
.xp-header{color:var(--gold);font-weight:700;font-size:16px}
.avatar{display:flex;justify-content:center;margin:20px 0}
.avatar-inner{width:140px;height:140px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-size:70px;box-shadow:0 0 35px rgba(34,211,238,0.6);border:6px solid rgba(255,255,255,0.2);}
</style>
</head>
<body>

<div class="screen active" id="s-app" style="height:100vh;display:flex;flex-direction:column;position:relative;z-index:1">
  <div style="padding:16px;background:rgba(15,23,42,0.95);border-bottom:1px solid #334155;z-index:2;display:flex;justify-content:space-between;align-items:center">
    <div class="h1">HyperStart</div>
    <div class="xp-header" id="xp-display">245 XP</div>
  </div>

  <div id="app-content" style="flex:1;overflow-y:auto;padding:20px;position:relative;z-index:2">
    <div id="app-inner"></div>
  </div>

  <div class="bottom-nav">
    <div onclick="showTab('home')">🏠 Home</div>
    <div onclick="showTab('pathways')">⚡ Pathways</div>
    <div onclick="showTab('money')">💰 Money</div>
    <div onclick="showTab('think')">🧠 Think</div>
    <div onclick="showTab('engineering')">🏗️ Build</div>
  </div>
</div>

<script>
console.log("✅ HyperStart - Avatar Dashboard V2");

// State
let student = {name: "Zara Williams", xp: 245};

// Navigation
function showTab(tab) {
  const inner = document.getElementById('app-inner');
  inner.innerHTML = '';
  if (tab === 'home') renderHome(inner);
  else if (tab === 'pathways') renderPathways(inner);
  else if (tab === 'money') renderMoney(inner);
  else if (tab === 'think') renderThink(inner);
  else if (tab === 'engineering') renderEngineering(inner);
  updateXP();
}

function updateXP() {
  document.getElementById('xp-display').textContent = student.xp + " XP";
}

// HOME
function renderHome(el) {
  const name = student.name.split(' ')[0];
  el.innerHTML = `
    <div class="h1">Hey, ${name} 👋</div>
    <p style="color:var(--muted)">Let's build something awesome today!</p>
    
    <div class="card" style="text-align:center">
      <div style="font-size:64px">📋</div>
      <h2>Pre-Assessment</h2>
      <button onclick="startPreAssessment()" class="btn btn-teal">Take Pre-Assessment →</button>
    </div>

    <div class="card" style="text-align:center">
      <div style="font-size:70px">🚀</div>
      <h2>Business Builder</h2>
      <button onclick="showTab('engineering')" class="btn">Open My Startup →</button>
    </div>
  `;
}
window.startPreAssessment = () => window.location.href = '/static/pre-assessment.html';

// PATHWAYS
function renderPathways(el) {
  el.innerHTML = `
    <div class="h1">What Problem Will You Solve?</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px">
      <div onclick="pickInterest('tech')" class="card" style="cursor:pointer;text-align:center">💻 Technology</div>
      <div onclick="pickInterest('health')" class="card" style="cursor:pointer;text-align:center">🩺 Health Sciences</div>
      <div onclick="pickInterest('eng')" class="card" style="cursor:pointer;text-align:center">🛠️ Engineering</div>
      <div onclick="pickInterest('energy')" class="card" style="cursor:pointer;text-align:center">🌱 Environment</div>
    </div>
  `;
}
window.pickInterest = function(key) {
  alert("Great choice! +50 XP");
  student.xp += 50;
  updateXP();
};

// MONEY
function renderMoney(el) {
  el.innerHTML = `
    <div class="h1">Life & Money Skills</div>
    <div class="card">
      <h3>Monthly Budget Challenge</h3>
      <p>You have <strong>$896</strong> this month.</p>
      <button onclick="startBudgetChallenge()" class="btn">Start Challenge</button>
    </div>
  `;
}
window.startBudgetChallenge = function() {
  alert("Smart choices! +60 XP");
  student.xp += 60;
  updateXP();
};

// THINK
function renderThink(el) {
  el.innerHTML = `
    <div class="h1">Big Questions</div>
    <div class="card">
      <h3>How do we use technology responsibly?</h3>
      <textarea style="width:100%;height:140px;background:var(--surf2);border:1px solid var(--border);border-radius:12px;padding:14px" placeholder="Your thoughts..."></textarea>
      <button onclick="saveReflection()" class="btn">Save Reflection (+25 XP)</button>
    </div>
  `;
}
window.saveReflection = function() {
  alert("Reflection saved! +25 XP");
  student.xp += 25;
  updateXP();
};

// BUILD - Avatar Dashboard Style
function renderEngineering(el) {
  el.innerHTML = `
    <div class="h1">My STEM Business Builder</div>
    <div class="card">
      <h3>Founder Avatar</h3>
      <div class="avatar"><div class="avatar-inner">🧑‍💼</div></div>
      <div style="display:flex;gap:12px">
        <button onclick="randomizeAvatar()" class="btn" style="background:var(--surf2);color:white">Randomize</button>
        <button onclick="saveAvatar()" class="btn">Save Avatar</button>
      </div>
    </div>
    <div class="card">
      <h3>Northside Ventures</h3>
      <p>Cash: <span id="cash-balance" style="font-weight:700;color:var(--gold)">$2,450</span></p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px">
        <button onclick="makeBusinessDecision(1)" class="btn" style="background:var(--surf2);color:white">Lower Prices</button>
        <button onclick="makeBusinessDecision(2)" class="btn" style="background:var(--surf2);color:white">Marketing</button>
        <button onclick="makeBusinessDecision(3)" class="btn" style="background:var(--surf2);color:white">Equipment</button>
        <button onclick="showYear1Report()" class="btn btn-teal">Year 1 Report</button>
      </div>
    </div>
    <button onclick="finishProgram()" class="btn" style="background:var(--accent)">Finish Program → Post-Assessment</button>
  `;
}
function randomizeAvatar() {
  const avatars = ['🧑‍💼','👩‍🔬','🧑‍🚀','👨‍💻','🧑‍🌾'];
  document.querySelector('.avatar-inner').textContent = avatars[Math.floor(Math.random()*avatars.length)];
}
function saveAvatar(){ alert("Avatar saved!"); }
let businessCash = 2450;
function makeBusinessDecision(n){
  const gains = [620,920,1380];
  businessCash += gains[n-1];
  document.getElementById('cash-balance').textContent = '$' + businessCash;
  alert("Smart decision! +30 XP");
  student.xp += 30;
  updateXP();
}
function showYear1Report(){
  alert("🎉 Year 1 Report: Great job! +280 XP");
  student.xp += 280;
  updateXP();
}
function finishProgram(){
  window.location.href = '/static/post-assessment.html';
}

// Start
document.addEventListener('DOMContentLoaded', () => showTab('home'));
window.showTab = showTab;
</script>
</body>
</html>
