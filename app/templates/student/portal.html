<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HyperStart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f172a;--surf:#1e2937;--surf2:#334155;--border:rgba(255,255,255,0.1);--gold:#facc15;--teal:#22d3ee;--muted:#94a3b8;--r:20px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:#f1f5f9;height:100vh;overflow:hidden;position:relative}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(circle at 30% 20%,rgba(34,211,238,0.25),transparent 50%),radial-gradient(circle at 70% 80%,rgba(250,204,21,0.2),transparent 50%);}
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:20px}
.btn{display:block;width:100%;padding:16px;border-radius:14px;background:var(--gold);color:#0f172a;font-weight:700;text-align:center;margin-top:12px;cursor:pointer}
.h1{font-size:26px;font-weight:800;margin-bottom:8px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;padding:14px 0;background:rgba(15,23,42,0.97);border-top:1px solid #334155;display:flex;font-size:13px;z-index:10}
.bottom-nav > div{flex:1;text-align:center;cursor:pointer;padding:8px 4px}
.xp-header{color:var(--gold);font-weight:700}
</style>
</head>
<body>

<div class="screen active" id="s-app" style="height:100vh;display:flex;flex-direction:column">
  <div style="padding:16px;background:rgba(15,23,42,0.95);border-bottom:1px solid #334155;display:flex;justify-content:space-between">
    <div class="h1">HyperStart</div>
    <div class="xp-header" id="xp-display">245 XP</div>
  </div>

  <div id="app-content" style="flex:1;overflow-y:auto;padding:20px">
    <div id="app-inner"></div>
  </div>

  <div class="bottom-nav">
    <div onclick="showTab('home')">🏠 Home</div>
    <div onclick="showTab('pathways')">⚡ Pathways</div>
    <div onclick="showTab('money')">💰 Money</div>
    <div onclick="showTab('think')">🧠 Think</div>
    <div onclick="showTab('engineering')">🏗️ Build</div>
  </div>
</div>

<script>
console.log("✅ HyperStart - Clean Avatar Style");

let student = {name: "Zara Williams", xp: 245};

function showTab(tab) {
  const inner = document.getElementById('app-inner');
  inner.innerHTML = '';
  if (tab === 'home') renderHome(inner);
  else if (tab === 'pathways') renderPathways(inner);
  else if (tab === 'money') renderMoney(inner);
  else if (tab === 'think') renderThink(inner);
  else if (tab === 'engineering') renderEngineering(inner);
}

function renderHome(el) {
  const name = student.name.split(' ')[0];
  el.innerHTML = `
    <div class="h1">Hey, ${name} 👋</div>
    <div class="card" style="text-align:center">
      <div style="font-size:60px">📋</div>
      <h2>Pre-Assessment</h2>
      <button onclick="startPreAssessment()" class="btn" style="background:var(--teal)">Take Pre-Assessment →</button>
    </div>
    <div class="card" style="text-align:center">
      <div style="font-size:70px">🚀</div>
      <h2>Ready to Build Your Business?</h2>
      <button onclick="showTab('engineering')" class="btn">Open Business Builder →</button>
    </div>
  `;
}
window.startPreAssessment = () => window.location.href = '/static/pre-assessment.html';

function renderPathways(el) {
  el.innerHTML = `<div class="h1">Career Sparks</div><p>Tap what interests you</p>`;
}

function renderMoney(el) {
  el.innerHTML = `<div class="h1">Life & Money Skills</div><div class="card"><button onclick="alert('Budget Challenge Started! +60 XP')" class="btn">Start Budget Challenge</button></div>`;
}

function renderThink(el) {
  el.innerHTML = `<div class="h1">Big Questions</div><div class="card"><p>How do we use technology responsibly?</p><button onclick="alert('Reflection saved! +25 XP')" class="btn">Save Reflection</button></div>`;
}

function renderEngineering(el) {
  el.innerHTML = `
    <div class="h1">My STEM Business Builder</div>
    <div class="card">
      <h3>Founder Avatar</h3>
      <div style="text-align:center;font-size:80px;margin:20px 0">🧑‍💼</div>
      <button onclick="alert('Avatar Randomized!')" class="btn">Randomize</button>
      <button onclick="alert('Avatar Saved!')" class="btn">Save Avatar</button>
    </div>
    <div class="card">
      <h3>Northside Ventures</h3>
      <p>Cash: <span style="color:var(--gold)">$2,450</span></p>
      <button onclick="alert('Smart decision! +30 XP')" class="btn">Make Decision</button>
    </div>
  `;
}

// Start
document.addEventListener('DOMContentLoaded', () => showTab('home'));
window.showTab = showTab;
</script>
</body>
</html>
