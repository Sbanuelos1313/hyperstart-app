function renderEngineering(el){

  `;
}
function randomizeAvatar() {
  const skins = ['#f4c2a1', '#e0ac7e', '#c68642', '#a67c5d'];
  avatarState.skin = skins[Math.floor(Math.random()*skins.length)];
  updateFounderAvatar();
}

  businessCash += gains[choice-1];
  document.getElementById('cash-balance').textContent = '$' + businessCash.toLocaleString();

  const profit = businessCash - 1600;

  init();

    .then(r => r.json())
    .then(data => {
      if (data && data.id) {
        student = {id: data.id, name: data.name, grade: data.grade||7, school: data.school||'F.D. Moon Middle School', emoji:'✨', color:'#f5c842', xp: data.xp||0, cluster: data.cluster||null, tab:'home'};

        student = PERSONAS[0];
      }
      showTab('home');
    })
    .catch(() => {
