<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HyperStart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{--bg:#0a0e1a;--surf:#111827;--surf2:#1a2235;--border:rgba(255,255,255,0.07);--border-hi:rgba(255,255,255,0.14);--gold:#f5c842;--gold-d:rgba(245,200,66,0.1);--teal:#2dd4bf;--teal-d:rgba(45,212,191,0.1);--violet:#a78bfa;--violet-d:rgba(167,139,250,0.1);--coral:#fb7185;--coral-d:rgba(251,113,133,0.1);--green:#4ade80;--green-d:rgba(74,222,128,0.1);--amber:#fb923c;--amber-d:rgba(251,146,60,0.1);--text:#f0f4ff;--muted:#8b95b0;--r:14px;--r-sm:8px}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,0.012) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.012) 1px,transparent 1px);background-size:44px 44px}
.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(110px)}
.o1{width:560px;height:560px;background:#2dd4bf;top:-180px;right:-120px;opacity:.14}
.o2{width:440px;height:440px;background:#a78bfa;bottom:-120px;left:-100px;opacity:.13}
.o3{width:320px;height:320px;background:#f5c842;top:45%;left:45%;transform:translate(-50%,-50%);opacity:.05}
.screen{display:none;height:100vh;flex-direction:column;overflow:hidden;position:relative;z-index:1}
.screen.active{display:flex}
.topbar{position:relative;z-index:50;background:rgba(10,14,26,.9);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);padding:0 18px;display:flex;align-items:center;justify-content:space-between;height:54px;flex-shrink:0}
.logo{font-family:'Bricolage Grotesque',sans-serif;font-size:19px;font-weight:800;letter-spacing:-.5px}
.logo em{color:var(--gold);font-style:normal}
.logo-sub{font-size:10px;color:var(--muted);font-weight:400;display:block;margin-top:-2px}
.chips{display:flex;align-items:center;gap:8px}
.chip{padding:5px 11px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border);background:var(--surf);white-space:nowrap}
.chip-gold{border-color:rgba(245,200,66,.3);color:var(--gold)}
.chip-teal{border-color:rgba(45,212,191,.3);color:var(--teal)}
.bnav{display:flex;background:rgba(10,14,26,.95);border-top:1px solid var(--border);padding:8px 0 14px;position:relative;z-index:50;backdrop-filter:blur(24px);flex-shrink:0}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;transition:all .15s;padding:2px 0}
.bni:hover{transform:scale(1.08)}
.bni-wrap{width:38px;height:38px;border-radius:11px;background:var(--surf2);display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .25s}
.bni.active .bni-wrap{background:linear-gradient(135deg,rgba(245,200,66,.3),rgba(45,212,191,.25));box-shadow:0 4px 14px rgba(245,200,66,.2)}
.bni-lbl{font-size:9px;font-weight:600;color:var(--muted);letter-spacing:.02em}
.bni.active .bni-lbl{color:var(--gold)}
.scroll{flex:1;overflow-y:auto;padding:20px 18px 24px;position:relative;z-index:1}
.inner{max-width:680px;margin:0 auto}
.h1{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(22px,5vw,32px);font-weight:800;line-height:1.15;letter-spacing:-.5px;margin-bottom:6px}
.h1 .a{color:var(--gold)}
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:18px;transition:border-color .2s,transform .2s}
.card+.card{margin-top:10px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:12px 22px;border-radius:var(--r-sm);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s;white-space:nowrap;line-height:1}
.btn-gold{background:var(--gold);color:#0a0e1a}
.btn-gold:hover:not(:disabled){filter:brightness(1.08);transform:translateY(-1px);box-shadow:0 6px 20px rgba(245,200,66,.3)}
.btn-out{background:transparent;color:var(--text);border:1px solid var(--border-hi)}
.btn-out:hover{border-color:var(--gold);color:var(--gold)}
.btn-block{width:100%}
.inp{width:100%;padding:12px 15px;background:var(--surf2);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color .2s}
</style>
</head>
<body>

<div class="bg-canvas" id="bg-canvas"> ... (your background symbols stay) ... </div>
<div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>

<!-- Login and other screens stay the same -->

<div class="screen active" id="s-app">
  <!-- Topbar and bottom nav stay the same -->
  <div class="topbar"> ... </div>
  <div style="flex:1;overflow:hidden;position:relative">
    <div id="app-content" style="height:100%;overflow-y:auto;padding:18px 18px 20px;position:relative;z-index:1">
      <div class="inner" id="app-inner"></div>
    </div>
  </div>
  <div class="bnav" id="app-bnav">
    <!-- your bottom nav stays -->
    <div class="bni active" id="bn-home" onclick="showTab('home')"><div class="bni-wrap">🏠</div><span class="bni-lbl">Home</span></div>
    <div class="bni" id="bn-engineering" onclick="showTab('engineering')"><div class="bni-wrap">🏗️</div><span class="bni-lbl">Build</span></div>
    <!-- other tabs -->
  </div>
</div>

<script>
console.log("✅ HyperStart - Clean Final Version");

// === ALL CONSTANTS (keep your full ones here) ===
const PERSONAS = [ /* paste your full PERSONAS array */ ];
const CLUSTERS = { /* full CLUSTERS */ };
const WOVEN = { /* full WOVEN */ };
const STORYLINES = { /* full STORYLINES */ };
const BUDGET_SCENARIOS = [ /* full */ ];
const INTEREST_MAP = { /* full */ };
const AI_LITERACY_MODULES = [ /* full */ ];
const BIG_QUESTIONS = [ /* full */ ];
const LIFE_MODULES = [ /* full */ ];

// Variables
let student = null;
let answers = {};
let currentTab = 'home';

// ====================== BUSINESS BUILDER ======================
function renderEngineering(el){
  el.innerHTML = `
    <div class="h1 mb4">🚀 <span class="a">My STEM Business Builder</span></div>
    <p style="color:var(--muted);margin-bottom:20px">Build your founder avatar, then run your own business simulation.</p>

    <div class="card" style="text-align:center;padding:28px 20px;margin-bottom:24px">
      <h3 style="margin-bottom:12px">Build Your Founder Avatar</h3>
      <svg id="founder-avatar" width="300" height="410" viewBox="0 0 300 410" style="background:#1e2937;border-radius:24px;box-shadow:0 10px 40px rgba(0,0,0,0.6)"></svg>
      <div style="margin-top:20px">
        <button onclick="randomizeAvatar()" class="btn btn-out" style="margin-right:8px">🎲 Randomize</button>
        <button onclick="saveAvatar()" class="btn btn-gold">💾 Save Avatar</button>
      </div>
    </div>

    <div class="card">
      <h3 id="biz-name" style="color:var(--gold);margin-bottom:8px">Northside Solar Ventures</h3>
      <p><strong>Cash Balance:</strong> <span id="cash-balance" style="font-family:DM Mono,monospace;font-size:20px;font-weight:700">$2,450</span></p>

      <div style="margin:20px 0">
        <h4 style="margin-bottom:10px">This Week’s Deductive Challenge</h4>
        <button onclick="makeBusinessDecision(1)" style="width:100%;margin-bottom:8px;padding:14px;background:var(--teal);color:#0a0e1a;border-radius:12px;font-weight:600">Lower prices to attract more customers</button>
        <button onclick="makeBusinessDecision(2)" style="width:100%;margin-bottom:8px;padding:14px;background:var(--teal);color:#0a0e1a;border-radius:12px;font-weight:600">Invest in marketing</button>
        <button onclick="makeBusinessDecision(3)" style="width:100%;padding:14px;background:var(--teal);color:#0a0e1a;border-radius:12px;font-weight:600">Buy better equipment</button>
      </div>

      <button onclick="showYear1Report()" class="btn btn-gold btn-block" style="margin-top:20px">📊 See Year 1 Report Card</button>
    </div>
  `;

  updateFounderAvatar();
  if (student && student.cluster) {
    document.getElementById('biz-name').textContent = student.cluster.replace('&', 'and') + " Ventures";
  }
}

let avatarState = {skin: '#f4c2a1'};
function updateFounderAvatar() {
  const svg = document.getElementById('founder-avatar');
  if (!svg) return;
  svg.innerHTML = `
    <ellipse cx="150" cy="135" rx="70" ry="85" fill="${avatarState.skin}"/>
    <path d="M90 90 Q150 45 210 90" fill="#2c2c2c"/>
    <rect x="90" y="215" width="120" height="175" rx="35" fill="#1e88e5"/>
    <text x="150" y="290" text-anchor="middle" fill="#fff" font-size="26" font-weight="700">CEO</text>
  `;
}
function randomizeAvatar() {
  const skins = ['#f4c2a1', '#e0ac7e', '#c68642', '#a67c5d'];
  avatarState.skin = skins[Math.floor(Math.random()*skins.length)];
  updateFounderAvatar();
}
function saveAvatar() { alert("✅ Avatar saved!"); }

let businessCash = 2450;
function makeBusinessDecision(choice) {
  const gains = [620, 920, 1380];
  businessCash += gains[choice-1];
  document.getElementById('cash-balance').textContent = '$' + businessCash.toLocaleString();
  alert("Great deductive reasoning! 💡 Your business grew.");
  awardXP(30);
}
function showYear1Report() {
  const profit = businessCash - 1600;
  alert(`🎉 YEAR 1 REPORT CARD\n\nBusiness: ${document.getElementById('biz-name').textContent}\nProfit: $${profit.toLocaleString()}\n\n+280 XP Awarded!`);
  awardXP(280);
}

// === SIMPLE HOME SCREEN ===
function renderHome(el){
  if (!student) student = {name: "Demo Student", xp: 120, grade: 7};
  const firstName = student.name.split(' ')[0];

  el.innerHTML = `
    <div style="margin-bottom:20px">
      <div class="h1" style="margin-bottom:4px">Hey, <span class="a">${firstName}</span> 👋</div>
      <div style="font-size:14px;color:var(--muted)">Welcome back to HyperStart. Let's build your future.</div>
    </div>

    <div class="card mb12" style="padding:30px;text-align:center">
      <div style="font-size:60px;margin-bottom:16px">🚀</div>
      <div class="h2 mb8">Ready to Build Your Business?</div>
      <p style="color:var(--muted);margin-bottom:20px">Click the <strong>Build</strong> tab at the bottom</p>
      <button onclick="showTab('engineering')" class="btn btn-gold btn-block" style="padding:16px;font-size:17px">Open Business Builder →</button>
    </div>
  `;
}

// Force start
document.addEventListener('DOMContentLoaded', function(){
  init();
  fetch('/student/api/me',{credentials:'include'})
    .then(r => r.json())
    .then(data => {
      if (data && data.id) {
        student = {id:data.id, name:data.name||'Student', grade:data.grade||7, xp:data.xp||0, cluster:data.cluster||null};
      } else {
        student = PERSONAS[0];
      }
      showTab('home');
    })
    .catch(() => {
      student = PERSONAS[0];
      showTab('home');
    });
});

// Global exports
window.showTab = showTab;
window.go = go;
window.loginStudent = loginStudent;
window.randomizeAvatar = randomizeAvatar;
window.saveAvatar = saveAvatar;
window.makeBusinessDecision = makeBusinessDecision;
window.showYear1Report = showYear1Report;
window.awardXP = awardXP;
window.renderHome = renderHome;
</script>
</body>
</html>
