<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HyperStart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f172a;--surf:#1e2937;--surf2:#334155;--border:rgba(255,255,255,0.1);--gold:#facc15;--teal:#22d3ee;--pink:#f472b6;--muted:#94a3b8;--r:20px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:#f1f5f9;height:100vh;overflow:hidden;position:relative}
body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(circle at 30% 20%,rgba(34,211,238,0.25),transparent 50%),radial-gradient(circle at 70% 80%,rgba(250,204,21,0.2),transparent 50%);}
.bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:20px;box-shadow:0 10px 30px rgba(0,0,0,0.4);}
.btn{display:block;width:100%;padding:16px;border-radius:14px;background:var(--gold);color:#0f172a;font-weight:700;text-align:center;margin-top:12px;cursor:pointer;font-size:15.5px}
.btn-teal{background:var(--teal);color:#0f172a}
.h1{font-size:26px;font-weight:800;margin-bottom:6px}
.h2{font-size:19px;font-weight:700}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;padding:12px 0;background:rgba(15,23,42,0.95);border-top:1px solid #334155;display:flex;font-size:13px;z-index:10}
.bottom-nav > div{flex:1;text-align:center;cursor:pointer;padding:8px 4px}
.xp-header{color:var(--gold);font-weight:700}
.avatar-circle{width:120px;height:120px;border-radius:50%;background:var(--teal);margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:50px;box-shadow:0 0 30px rgba(34,211,238,0.5);}
</style>
</head>
<body>

<div class="bg-canvas"></div>

<div class="screen active" id="s-app" style="height:100vh;display:flex;flex-direction:column;position:relative;z-index:1">
  <div style="padding:16px;background:rgba(15,23,42,0.95);border-bottom:1px solid #334155;z-index:2;display:flex;justify-content:space-between;align-items:center">
    <div class="h1" style="display:flex;align-items:center;gap:12px">
      HyperStart
    </div>
    <div class="xp-header" id="xp-display">245 XP</div>
  </div>

  <div id="app-content" style="flex:1;overflow-y:auto;padding:20px;position:relative;z-index:2">
    <div id="app-inner"></div>
  </div>

  <div class="bottom-nav">
    <div onclick="showTab('home')">🏠 Home</div>
    <div onclick="showTab('pathways')">⚡ Pathways</div>
    <div onclick="showTab('money')">💰 Money</div>
    <div onclick="showTab('think')">🧠 Think</div>
    <div onclick="showTab('engineering')">🏗️ Build</div>
  </div>
</div>

<script>
console.log("✅ HyperStart - Avatar Dashboard Style");

let student = {name: "Zara Williams", xp: 245, grade: 7};

function showTab(tab) {
  const inner = document.getElementById('app-inner');
  inner.innerHTML = '';
  if (tab === 'home') renderHome(inner);
  else if (tab === 'pathways') renderPathways(inner);
  else if (tab === 'money') renderMoney(inner);
  else if (tab === 'think') renderThink(inner);
  else if (tab === 'engineering') renderEngineering(inner);
  updateXP();
}

function updateXP() {
  document.getElementById('xp-display').textContent = student.xp + " XP";
}

// HOME
function renderHome(el) {
  const name = student.name.split(' ')[0];
  el.innerHTML = `
    <div class="h1">Hey, ${name} 👋</div>
    <p style="color:var(--muted);margin-bottom:24px">Ready to build something awesome?</p>
    
    <div class="card" style="text-align:center">
      <div style="font-size:64px">📋</div>
      <h2>Pre-Assessment</h2>
      <button onclick="startPreAssessment()" class="btn btn-teal">Take Pre-Assessment →</button>
    </div>

    <div class="card" style="text-align:center">
      <div style="font-size:64px">🚀</div>
      <h2>Business Builder</h2>
      <button onclick="showTab('engineering')" class="btn">Open My Startup →</button>
    </div>
  `;
}
window.startPreAssessment = () => window.location.href = '/static/pre-assessment.html';

// PATHWAYS
function renderPathways(el) {
  el.innerHTML = `
    <div class="h1">What Problem Will You Solve?</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px">
      <div onclick="pickInterest('tech')" class="card" style="cursor:pointer;text-align:center">💻 Tech Innovator</div>
      <div onclick="pickInterest('health')" class="card" style="cursor:pointer;text-align:center">🩺 Health Hero</div>
      <div onclick="pickInterest('eng')" class="card" style="cursor:pointer;text-align:center">🛠️ Engineer</div>
      <div onclick="pickInterest('energy')" class="card" style="cursor:pointer;text-align:center">🌱 Planet Protector</div>
    </div>
  `;
}
window.pickInterest = function(key) {
  alert("Great choice! You're going to be awesome at that. +50 XP");
  student.xp += 50;
  updateXP();
};

// MONEY, THINK, BUILD (similar enhanced style)
function renderMoney(el) { el.innerHTML = `<div class="h1">Life & Money Skills</div><div class="card"><h3>Budget Challenge</h3><button onclick="startBudgetChallenge()" class="btn">Start Challenge</button></div>`; }
function renderThink(el) { el.innerHTML = `<div class="h1">Big Questions</div><div class="card"><textarea style="width:100%;height:140px" placeholder="Share your thoughts..."></textarea><button onclick="saveReflection()" class="btn">Save Reflection</button></div>`; }
function renderEngineering(el) { /* your favorite avatar builder style */ el.innerHTML = `... (full avatar code)`; }

// Start
document.addEventListener('DOMContentLoaded', () => showTab('home'));
window.showTab = showTab;
</script>
</body>
</html>
