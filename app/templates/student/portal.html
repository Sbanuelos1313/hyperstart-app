<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HyperStart — {{ user.full_name }}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Crect width=%27100%27 height=%27100%27 rx=%2722%27 fill=%27%230a0e1a%27/%3E%3Crect x=%2716%27 y=%2718%27 width=%2721%27 height=%2764%27 rx=%2710%27 fill=%27%235b8ecf%27/%3E%3Crect x=%2763%27 y=%2718%27 width=%2721%27 height=%2764%27 rx=%2710%27 fill=%27%239b6a7a%27/%3E%3Crect x=%2716%27 y=%2740%27 width=%2768%27 height=%2720%27 rx=%2710%27 fill=%27%23f5c842%27/%3E%3C/svg%3E">
<!-- Inject user data for JS -->
<script>
window.HS_USER = {
  id: {{ user.id }},
  name: "{{ user.full_name }}",
  email: "{{ user.email }}",
  grade: {{ user.grade or 7 }},
  school: "{{ user.school or 'F.D. Moon Middle School' }}",
  xp: {{ user.xp or 0 }},
  cluster: {{ ('"%s"' % user.cluster) if user.cluster else 'null' }},
  role: "{{ user.role }}"
};
window.HS_PROGRESS = {
  pre_done: {{ 'true' if (progress and progress.pre_done) else 'false' }},
  money_mod: {{ progress.money_mod if progress else 0 }},
  think_q: {{ progress.think_q if progress else 0 }},
  story_done: {{ 'true' if (progress and progress.story_done) else 'false' }},
  ai_mod: {{ progress.ai_mod if progress else 0 }},
  eng_done: {{ 'true' if (progress and progress.eng_done) else 'false' }},
  career_sparks_done: {{ 'true' if (progress and progress.career_sparks_done) else 'false' }},
  reflections: {{ progress.reflections | tojson if (progress and progress.reflections) else '{}' }}
};
</script>
</head>
<body>
<!-- The full app HTML is served via the static grades-6-8 content, 
     but enhanced with real user data from HS_USER and HS_PROGRESS,
     and API calls to save progress -->
<div id="app-root"></div>
<script src="/static/js/app.js"></script>
</body>
</html>
