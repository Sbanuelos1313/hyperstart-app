<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In - HyperStart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:"DM Sans",sans-serif;
  background:#060d18;
  color:#f0f4ff;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  position:relative;
  overflow:hidden;
}
body::before{
  content:"";
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 60% at 100% 0%,rgba(13,90,100,0.4),transparent 60%),
    radial-gradient(ellipse 60% 50% at 0% 100%,rgba(8,50,70,0.25),transparent 60%),
    radial-gradient(ellipse 50% 40% at 50% 0%,rgba(245,200,66,0.05),transparent 55%);
}
/* Animated background words */
.bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
.bg-word{position:absolute;font-family:"Bricolage Grotesque",sans-serif;font-weight:800;font-size:clamp(11px,2vw,15px);letter-spacing:0.15em;text-transform:uppercase;opacity:0.03;color:#f0f4ff;animation:bgDrift linear infinite;white-space:nowrap;}
.bg-word.teal{color:#2dd4bf;opacity:0.04;}
.bg-word.gold{color:#f5c842;opacity:0.035;}
@keyframes bgDrift{0%{transform:translateX(-20vw);opacity:0;}5%{opacity:0.04;}95%{opacity:0.04;}100%{transform:translateX(110vw);opacity:0;}}
.box{
  background:rgba(10,16,30,0.85);
  backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:20px;
  padding:36px;
  max-width:420px;
  width:100%;
  position:relative;
  z-index:1;
}
.logo-area{text-align:center;margin-bottom:28px;}
.logo-title{font-family:"Bricolage Grotesque",sans-serif;font-size:28px;font-weight:800;margin-top:12px;}
.logo-title span{color:#f5c842;}
.logo-sub{font-size:12px;color:#8b95b0;margin-top:5px;letter-spacing:.06em;text-transform:uppercase;}
.tabs{display:flex;margin-bottom:24px;border:1px solid rgba(255,255,255,0.07);border-radius:8px;overflow:hidden;}
.tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:#8b95b0;border:none;transition:all .2s;font-family:"DM Sans",sans-serif;}
.tab.active{background:#f5c842;color:#0a0e1a;}
.field{margin-bottom:16px;}
label{font-size:11px;font-weight:700;color:#8b95b0;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:6px;}
input,select{
  width:100%;padding:12px 15px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:8px;color:#f0f4ff;
  font-family:"DM Sans",sans-serif;font-size:15px;outline:none;
  transition:border-color .2s;
}
input:focus,select:focus{border-color:#f5c842;}
input::placeholder{color:#8b95b0;}
select option{background:#111827;}
.btn{
  width:100%;padding:13px;
  background:#f5c842;color:#0a0e1a;
  border:none;border-radius:8px;
  font-family:"DM Sans",sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;margin-top:8px;transition:all .2s;
}
.btn:hover{filter:brightness(1.08);}
.error{
  background:rgba(251,113,133,0.1);
  border:1px solid rgba(251,113,133,0.3);
  border-radius:8px;padding:10px 14px;
  font-size:13px;color:#fb7185;margin-bottom:16px;
}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.admin-note{font-size:12px;color:#8b95b0;text-align:center;margin-top:16px;line-height:1.6;}
.admin-note a{color:#2dd4bf;text-decoration:none;}
.divider{height:1px;background:rgba(255,255,255,0.07);margin:20px 0;}
.pills{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;}
.pill{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;}
.p-teal{background:rgba(45,212,191,0.1);color:#2dd4bf;border:1px solid rgba(45,212,191,0.25);}
.p-gold{background:rgba(245,200,66,0.1);color:#f5c842;border:1px solid rgba(245,200,66,0.25);}
</style>
</head>
<body>
<div class="bg-canvas">
  <div class="bg-word teal" style="top:15%;animation-duration:90s;animation-delay:0s">ENGINEER</div>
  <div class="bg-word gold" style="top:30%;animation-duration:110s;animation-delay:-15s">SCIENTIST</div>
  <div class="bg-word" style="top:50%;animation-duration:80s;animation-delay:-30s">CREATOR</div>
  <div class="bg-word teal" style="top:65%;animation-duration:100s;animation-delay:-8s">HEALER</div>
  <div class="bg-word gold" style="top:80%;animation-duration:95s;animation-delay:-20s">BUILDER</div>
</div>

<div class="box">
  <div class="logo-area">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="56" height="56" style="display:block;margin:0 auto">
      <rect width="100" height="100" rx="22" fill="#0a0e1a"/>
      <rect width="100" height="100" rx="22" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>
      <rect x="16" y="18" width="21" height="64" rx="10" fill="#5b8ecf"/>
      <rect x="63" y="18" width="21" height="64" rx="10" fill="#9b6a7a"/>
      <rect x="16" y="40" width="68" height="20" rx="10" fill="#f5c842"/>
    </svg>
    <div class="logo-title">Hyper<span>Start</span></div>
    <div class="logo-sub">STEM/STEAM Career Pathways &middot; Grades 6&ndash;8</div>
  </div>

  <div class="pills">
    <span class="pill p-teal">F.D. Moon</span>
    <span class="pill p-gold">Millwood</span>
    <span class="pill p-teal">Classen SAS</span>
    <span class="pill p-gold">2026&ndash;27</span>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
    <button class="tab" id="tab-register" onclick="switchTab('register')">New Student</button>
  </div>

  {% if error %}<div class="error">{{ error }}</div>{% endif %}

  <form id="form-login" action="/auth/login" method="POST">
    <div class="field">
      <label>Email</label>
      <input type="email" name="email" placeholder="your@email.com" required autocomplete="email">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" required>
    </div>
    <button type="submit" class="btn">Sign In &rarr;</button>
  </form>

  <form id="form-register" action="/auth/register" method="POST" style="display:none">
    <div class="field">
      <label>Full Name</label>
      <input type="text" name="full_name" placeholder="Your name" required>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" name="email" placeholder="your@email.com" required>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" placeholder="Create a password" required minlength="6">
    </div>
    <div class="grid2">
      <div class="field">
        <label>Grade</label>
        <select name="grade" required>
          <option value="6">6th Grade</option>
          <option value="7">7th Grade</option>
          <option value="8">8th Grade</option>
        </select>
      </div>
      <div class="field">
        <label>Zip Code</label>
        <input type="text" name="zip_code" placeholder="73111" maxlength="5">
      </div>
    </div>
    <div class="field">
      <label>School</label>
      <select name="school" required>
        <option value="">Select your school</option>
        <option value="F.D. Moon Middle School">F.D. Moon Middle School</option>
        <option value="Classen SAS">Classen SAS</option>
        <option value="Millwood Public Schools">Millwood Public Schools</option>
      </select>
    </div>
    <button type="submit" class="btn">Create Account &rarr;</button>
  </form>

  <div class="divider"></div>
  <div class="admin-note">
    Administrators &amp; committee members:<br>
    <a href="/admin/dashboard">Admin Dashboard &rarr;</a>
  </div>
</div>

<script>
function switchTab(t) {
  document.getElementById("form-login").style.display = t==="login" ? "block" : "none";
  document.getElementById("form-register").style.display = t==="register" ? "block" : "none";
  document.getElementById("tab-login").className = "tab" + (t==="login" ? " active" : "");
  document.getElementById("tab-register").className = "tab" + (t==="register" ? " active" : "");
}
</script>
</body>
</html>
