<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HyperStart — Pre-Assessment</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* (same styles as before - keeping it clean) */
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#060d18;color:#f0f4ff;min-height:100vh;position:relative;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 80% 60% at 100% 0%,rgba(13,90,100,0.35),transparent 60%),radial-gradient(ellipse 50% 40% at 0% 100%,rgba(8,50,70,0.2),transparent 60%),radial-gradient(ellipse 40% 30% at 50% 0%,rgba(245,200,66,0.04),transparent 50%);}
.topbar{position:relative;z-index:2;background:rgba(7,11,20,0.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.07);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;}
.back-btn{background:rgba(255,255,255,0.1);color:white;border:1px solid rgba(255,255,255,0.2);padding:6px 14px;border-radius:8px;font-size:13px;cursor:pointer;}
.scroll{height:calc(100vh - 52px);overflow-y:auto;padding:28px 20px 40px;}
.inner{max-width:480px;margin:0 auto;}
/* ... rest of your original styles ... */
.scale-btn.sel{border-color:#2dd4bf;background:rgba(45,212,191,0.12);color:#2dd4bf;}
.submit-btn{width:100%;padding:15px;background:#f5c842;color:#0a0e1a;border:none;border-radius:10px;font-weight:800;cursor:pointer;}
</style>
</head>
<body>

<div class="topbar">
  <button class="back-btn" onclick="goBack()">← Back to Portal</button>
  <div class="logo" style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;">Hyper<em>Start</em></div>
</div>

<div class="scroll">
  <div class="inner">
    <!-- Your original progress dots, hero, and 4 scale blocks go here (same as before) -->
    <!-- ... paste your original scale blocks here ... -->

    <div class="divider"></div>
    <button class="submit-btn" onclick="submitAssessment()">Start My Journey →</button>
  </div>
</div>

<script>
var answers = {conf:0, aware:0, money:0, why:0};
var scales = ['conf','aware','money','why'];

function select(key, val) {
  answers[key] = val;
  // ... your original select logic ...
}

function goBack() {
  window.location.href = '/static/portal.html';
}

function submitAssessment() {
  var complete = scales.every(k => answers[k] > 0);
  if (!complete) {
    alert('Please rate all 4 questions before continuing.');
    return;
  }
  
  // Optional: send to backend
  fetch('/student/api/pre-assessment', {
    method: 'POST',
    credentials: 'include',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(answers)
  }).catch(() => {});

  alert("✅ Pre-Assessment saved! Welcome to HyperStart.");
  window.location.href = '/static/portal.html';
}
</script>
</body>
</html>
