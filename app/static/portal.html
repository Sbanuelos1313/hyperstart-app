<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HyperStart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e1a;--surf:#111827;--surf2:#1a2235;--border:rgba(255,255,255,0.07);--gold:#f5c842;--teal:#2dd4bf;--violet:#a78bfa;--muted:#8b95b0;--r:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:#f0f4ff;height:100vh;overflow:hidden;position:relative}

/* Background */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  background: radial-gradient(ellipse 80% 60% at 100% 0%, rgba(13,90,100,0.4), transparent 60%),
              radial-gradient(ellipse 60% 50% at 0% 100%, rgba(8,50,70,0.25), transparent 60%),
              radial-gradient(ellipse 50% 40% at 50% 0%, rgba(245,200,66,0.05), transparent 55%);
}
.bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
.bg-symbol, .bg-word { position: absolute; animation: bgFloat linear infinite; white-space: nowrap; user-select: none; }
.bg-symbol { font-size: clamp(16px, 3vw, 28px); opacity: 0.04; color: #f0f4ff; }
.bg-word { font-family: 'Bricolage Grotesque', sans-serif; font-weight: 800; font-size: clamp(11px, 2vw, 16px); letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.035; }
.bg-word.teal { color: #2dd4bf; opacity: 0.045; }
.bg-word.gold { color: #f5c842; opacity: 0.04; }
.bg-word.violet { color: #a78bfa; opacity: 0.04; }
@keyframes bgFloat { 0% { transform: translateY(100vh) rotate(var(--rot,0deg)); opacity:0; } 5% { opacity:0.04; } 95% { opacity:0.04; } 100% { transform: translateY(-20vh) rotate(var(--rot,0deg)); opacity:0; } }

/* UI */
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:20px;margin-bottom:16px}
.btn{display:block;width:100%;padding:14px;border-radius:8px;background:var(--gold);color:#0a0e1a;font-weight:600;text-align:center;margin-top:12px;cursor:pointer}
.h1{font-size:28px;font-weight:800;margin-bottom:8px}
.h2{font-size:20px;font-weight:700}

/* Fix bottom nav */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 12px 0;
  background: rgba(10,14,26,0.95);
  border-top: 1px solid #222;
  display: flex;
  font-size: 12px;
  z-index: 10;
}
.bottom-nav > div { flex: 1; text-align: center; cursor: pointer; padding: 8px 4px; }
</style>
</head>
<body>

<!-- Animated Background -->
<div class="bg-canvas">
  <div class="bg-symbol" style="left:8%;--rot:-12deg;animation-duration:55s;animation-delay:0s">E=mc²</div>
  <div class="bg-symbol" style="left:22%;--rot:8deg;animation-duration:70s;animation-delay:-6s">🧬</div>
  <div class="bg-symbol" style="left:38%;--rot:-5deg;animation-duration:48s;animation-delay:-11s">∑∫∂</div>
  <div class="bg-symbol" style="left:55%;--rot:15deg;animation-duration:62s;animation-delay:-3s">⚙️</div>
  <div class="bg-symbol" style="left:70%;--rot:-8deg;animation-duration:78s;animation-delay:-8s">🎵</div>
  <div class="bg-symbol" style="left:85%;--rot:6deg;animation-duration:52s;animation-delay:-15s">π r²</div>
  <div class="bg-word teal" style="top:8%;--dy:20px;animation-duration:88s;animation-delay:0s">ENGINEER</div>
  <div class="bg-word gold" style="top:18%;--dy:-15px;animation-duration:105s;animation-delay:-8s">SCIENTIST</div>
  <div class="bg-word" style="top:28%;--dy:30px;animation-duration:95s;animation-delay:-14s">CREATOR</div>
  <div class="bg-word violet" style="top:38%;--dy:-10px;animation-duration:112s;animation-delay:-3s">BUILDER</div>
  <div class="bg-word teal" style="top:48%;--dy:25px;animation-duration:83s;animation-delay:-19s">HEALER</div>
  <div class="bg-word gold" style="top:58%;--dy:-20px;animation-duration:100s;animation-delay:-11s">DESIGNER</div>
  <div class="bg-word" style="top:68%;--dy:15px;animation-duration:90s;animation-delay:-6s">ANALYST</div>
  <div class="bg-word violet" style="top:78%;--dy:-25px;animation-duration:108s;animation-delay:-22s">INNOVATOR</div>
</div>

<div class="screen active" id="s-app" style="height:100vh;display:flex;flex-direction:column;position:relative;z-index:1">
  <div style="padding:16px;background:rgba(10,14,26,0.95);border-bottom:1px solid #222;position:relative;z-index:2">
    <div class="h1" style="display:flex;align-items:center;gap:10px">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="42" height="42">
        <rect width="100" height="100" rx="22" fill="#0a0e1a"/>
        <rect x="16" y="18" width="21" height="64" rx="10" fill="#5b8ecf"/>
        <rect x="63" y="18" width="21" height="64" rx="10" fill="#9b6a7a"/>
        <rect x="16" y="40" width="68" height="20" rx="10" fill="#f5c842"/>
      </svg>
      HyperStart
    </div>
  </div>

  <div id="app-content" style="flex:1;overflow-y:auto;padding:20px;position:relative;z-index:2">
    <div id="app-inner"></div>
  </div>

  <!-- Fixed Bottom Nav -->
  <div class="bottom-nav">
    <div onclick="showTab('home')">🏠 Home</div>
    <div onclick="showTab('pathways')">⚡ Pathways</div>
    <div onclick="showTab('money')">💰 Money</div>
    <div onclick="showTab('think')">🧠 Think</div>
    <div onclick="showTab('engineering')">🏗️ Build</div>
  </div>
</div>

<script>
console.log("✅ HyperStart - Fixed Full Version");

// Data
const PERSONAS = [{id:'zara',name:'Zara Williams',grade:7,school:'F.D. Moon Middle School',emoji:'🌟',color:'#f5c842',xp:120,cluster:'Engineering & Design'}];

let student = PERSONAS[0];
let answers = {};

// Navigation
function showTab(tab){
  const inner = document.getElementById('app-inner');
  inner.innerHTML = '';
  if(tab === 'home') renderHome(inner);
  else if(tab === 'pathways') renderPathways(inner);
  else if(tab === 'money') renderMoney(inner);
  else if(tab === 'think') renderThink(inner);
  else if(tab === 'engineering') renderEngineering(inner);
}

// Home
function renderHome(el){
  const name = student.name.split(' ')[0];
  el.innerHTML = `
    <div class="h1">Hey, <span style="color:var(--gold)">${name}</span> 👋</div>
    <p>Welcome back. Let's build your future.</p>
    <div class="card" style="text-align:center;margin:20px 0;padding:40px 20px">
      <div style="font-size:70px">🚀</div>
      <div class="h2">Ready to Build Your Business?</div>
      <button onclick="showTab('engineering')" style="margin-top:20px">Open Business Builder →</button>
    </div>
  `;
}

// Business Builder (working)
function renderEngineering(el){
  el.innerHTML = `
    <div class="h1">My STEM Business Builder</div>
    <p style="color:var(--muted)">Build your avatar and run your business simulation.</p>
    <div class="card">
      <h3>Founder Avatar</h3>
      <svg id="founder-avatar" width="280" height="380" viewBox="0 0 300 410"></svg>
      <div style="margin:15px 0">
        <button onclick="randomizeAvatar()" style="margin-right:8px">Randomize</button>
        <button onclick="saveAvatar()">Save Avatar</button>
      </div>
    </div>
    <div class="card">
      <h3>Northside Ventures</h3>
      <p>Cash: <span id="cash-balance" style="font-weight:700">$2,450</span></p>
      <button onclick="makeBusinessDecision(1)" style="margin:8px 0">Lower Prices</button>
      <button onclick="makeBusinessDecision(2)" style="margin:8px 0">Invest in Marketing</button>
      <button onclick="makeBusinessDecision(3)" style="margin:8px 0">Buy Equipment</button>
      <button onclick="showYear1Report()" style="background:var(--teal);margin-top:12px">See Year 1 Report</button>
    </div>
  `;
  updateFounderAvatar();
}

// Avatar logic
let avatarState = {skin: '#f4c2a1'};
function updateFounderAvatar() {
  const svg = document.getElementById('founder-avatar');
  if (svg) svg.innerHTML = `<ellipse cx="150" cy="130" rx="65" ry="80" fill="${avatarState.skin}"/><rect x="85" y="210" width="130" height="170" rx="30" fill="#1e88e5"/><text x="150" y="280" text-anchor="middle" fill="white" font-size="24">CEO</text>`;
}
function randomizeAvatar(){ 
  avatarState.skin = ['#f4c2a1','#e0ac7e','#c68642'][Math.floor(Math.random()*3)]; 
  updateFounderAvatar(); 
}
function saveAvatar(){ alert("Avatar saved!"); }

let businessCash = 2450;
function makeBusinessDecision(n){
  const gains = [620,920,1380];
  businessCash += gains[n-1];
  document.getElementById('cash-balance').textContent = '$' + businessCash;
  alert("Smart decision! +30 XP");
}
function showYear1Report(){
  alert("🎉 Year 1 Report: Profit made! +280 XP");
}

// Improved other tabs
function renderPathways(el){ 
  el.innerHTML = `<div class="h1">Career Sparks</div>
    <div class="card"><p>Tap interests to discover your best STEM cluster match.</p><button class="btn">Start Interest Quiz</button></div>`;
}
function renderMoney(el){ 
  el.innerHTML = `<div class="h1">Life & Money Skills</div>
    <div class="card"><p>Module 1: Understanding Income & Budgeting</p><button class="btn">Start Budget Challenge</button></div>`;
}
function renderThink(el){ 
  el.innerHTML = `<div class="h1">Big Questions</div>
    <div class="card"><p>"What does it mean to live a good life in a world of technology?"</p><textarea style="width:100%;height:120px" placeholder="Write your reflection..."></textarea><button class="btn">Save Reflection (+20 XP)</button></div>`;
}

// Start
document.addEventListener('DOMContentLoaded', () => {
  showTab('home');
});

window.showTab = showTab;
</script>
</body>
</html>
