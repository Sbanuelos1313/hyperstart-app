<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>HyperStart - v9100</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a1428;--surf:#1a253f;--surf2:#253a5f;--border:rgba(255,255,255,0.15);--gold:#fcd34d;--teal:#67e8f9;--pink:#f9a8d4;--muted:#a5b4fc;--r:24px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:#f0f9ff;height:100vh;overflow:hidden;position:relative}
body::before{content:"";position:fixed;inset:0;z-index:0;background:radial-gradient(circle at 25% 25%,rgba(103,232,249,0.4),transparent 50%),radial-gradient(circle at 75% 75%,rgba(249,168,212,0.35),transparent 50%);}
.card{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:28px;margin-bottom:24px;box-shadow:0 15px 50px rgba(0,0,0,0.6);}
.btn{display:block;width:100%;padding:18px;border-radius:16px;background:var(--gold);color:#0a1428;font-weight:700;text-align:center;margin-top:16px;cursor:pointer;font-size:17px}
.btn-teal{background:var(--teal);color:#0a1428}
.h1{font-size:28px;font-weight:800;margin-bottom:12px}
.avatar-container{text-align:center;margin:24px 0}
.avatar-inner{width:200px;height:200px;border-radius:50%;background:linear-gradient(135deg,#67e8f9,#f9a8d4);margin:0 auto;box-shadow:0 0 70px rgba(103,232,249,0.9);border:14px solid #f0f9ff;display:flex;align-items:center;justify-content:center;font-size:110px;overflow:hidden}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,20,40,0.98);border-top:1px solid #4c6a9c;padding:12px 0;display:flex;z-index:20}
.bottom-nav > div{flex:1;text-align:center;cursor:pointer;color:#e0f2fe;font-size:13px}
</style>
</head>
<body>

<div class="screen active" id="s-app" style="height:100vh;display:flex;flex-direction:column;position:relative;z-index:1">
  <div style="padding:20px 16px;background:rgba(10,20,40,0.95);border-bottom:1px solid #4c6a9c;display:flex;justify-content:space-between;align-items:center;z-index:2">
    <div class="h1" style="color:#67e8f9">HyperStart</div>
    <div style="color:var(--gold);font-weight:700;font-size:18px" id="xp-display">245 XP</div>
  </div>

  <div id="app-content" style="flex:1;overflow-y:auto;padding:24px;position:relative;z-index:2">
    <div id="app-inner"></div>
  </div>

  <div class="bottom-nav">
    <div onclick="showTab('home')">🏠 Home</div>
    <div onclick="showTab('pathways')">⚡ Pathways</div>
    <div onclick="showTab('money')">💰 Money</div>
    <div onclick="showTab('think')">🧠 Think</div>
    <div onclick="showTab('engineering')">🏗️ Build</div>
  </div>
</div>

<script>
console.log("✅ HyperStart - v9100 Cute Avatar Dashboard");

let student = {name: "Zara Williams", xp: 245};

function showTab(tab) {
  const inner = document.getElementById('app-inner');
  inner.innerHTML = '';
  if (tab === 'home') renderHome(inner);
  else if (tab === 'pathways') renderPathways(inner);
  else if (tab === 'money') renderMoney(inner);
  else if (tab === 'think') renderThink(inner);
  else if (tab === 'engineering') renderEngineering(inner);
  updateXP();
}

function updateXP() {
  document.getElementById('xp-display').textContent = student.xp + " XP";
}

function renderEngineering(el) {
  el.innerHTML = `
    <div class="h1">My STEM Business Builder</div>
    <div class="card">
      <h3 style="margin-bottom:20px">Founder Avatar</h3>
      <div class="avatar-container">
        <div class="avatar-inner" id="avatar-inner">👩‍🔬</div>
      </div>
      <div style="display:flex;gap:16px">
        <button onclick="randomizeAvatar()" class="btn" style="background:var(--surf2);color:white">Randomize</button>
        <button onclick="saveAvatar()" class="btn">Save Avatar</button>
      </div>
    </div>
    <div class="card">
      <h3>Northside Ventures</h3>
      <p style="font-size:22px;margin:12px 0">Cash: <span id="cash-balance" style="color:var(--gold);font-weight:700">$2,450</span></p>
      <button onclick="finishProgram()" class="btn" style="background:var(--pink)">Finish Program → Post-Assessment</button>
    </div>
  `;
}

function randomizeAvatar() {
  const avatars = ['👩‍🔬','🧑‍🚀','👨‍💻','🌱','🛠️'];
  document.getElementById('avatar-inner').textContent = avatars[Math.floor(Math.random()*avatars.length)];
}
function saveAvatar(){ alert("Avatar saved! Great job!"); }
function finishProgram(){ window.location.href = '/static/post-assessment.html'; }

// Other tabs (basic for now)
function renderHome(el) { el.innerHTML = `<div class="h1">Hey Zara 👋</div><div class="card" style="text-align:center"><h2>Ready to build?</h2><button onclick="showTab('engineering')" class="btn">Go to Business Builder</button></div>`; }
function renderPathways(el) { el.innerHTML = `<div class="h1">Career Pathways</div><div class="card">Interest selection coming soon...</div>`; }
function renderMoney(el) { el.innerHTML = `<div class="h1">Life & Money Skills</div><div class="card"><button onclick="alert('Budget challenge started!')" class="btn">Start Budget Challenge</button></div>`; }
function renderThink(el) { el.innerHTML = `<div class="h1">Big Questions</div><div class="card"><textarea style="width:100%;height:180px;background:var(--surf2);border-radius:12px;padding:16px" placeholder="Your thoughts..."></textarea><button onclick="alert('Saved!')" class="btn">Save Reflection</button></div>`; }

// Start
document.addEventListener('DOMContentLoaded', () => showTab('home'));
window.showTab = showTab;
</script>
</body>
</html>
